id: 356
name: fbInputFileMultiple
description: "Use this file input field if you want users to upload more than 1 file. The AjaxUpload extra takes care of frontend functionality and backend processing (so make sure it's installed!)."
category: m_fb_input
properties: 'a:2:{s:13:"elementStatus";a:7:{s:4:"name";s:13:"elementStatus";s:4:"desc";s:0:"";s:4:"type";s:9:"textfield";s:7:"options";a:0:{}s:5:"value";s:5:"solid";s:7:"lexicon";s:20:"romanesco:properties";s:4:"area";s:0:"";}s:14:"elementPreview";a:7:{s:4:"name";s:14:"elementPreview";s:4:"desc";s:0:"";s:4:"type";s:9:"textfield";s:7:"options";a:0:{}s:5:"value";s:0:"";s:7:"lexicon";s:20:"romanesco:properties";s:4:"area";s:0:"";}}'

-----

[[+field_name_html:empty=`[[+field_name]]`:fbStripAsAlias:fbPrefixOutput:toPlaceholder=`name`]]

<div id="[[+name]]" class="[[+field_layout:is=`inherit`:then=`[[+form_layout]]`:else=`[[+field_layout]]`]] file-upload field [[!If? &subject=`[[!+fb[[*id]].error.[[*id:md5]][[+field_type_idx]]]]` &operator=`notempty` &then=`error`]] [[If? &subject=`[[+field_required]]` &operator=`eq` &operand=`1` &then=`required`]]">
    <label>[[+field_name:stripWords=`[[$fbStripWordsLabel]]`]]</label>
    [[!AjaxUpload?
        &maxFiles=`[[+upload_limit]]`
        &maxFileSize=`[[+max_file_size]]MB`
        &acceptedFileTypes=`[[+accepted_file_types:replaceRegex=`_[0-9]+`]]`
        &uploadSectionTpl=`fbInputFileMultipleRow`
        &placeholderPrefix=`fb[[*id]].`
        &addCss=`1`
        &showCredits=`0`
        &uid=`[[*id:md5]][[+field_type_idx]]`
    ]]
    [[+field_helptext:notempty=`<span class="help">[[+field_helptext]]</span>`]]
</div>