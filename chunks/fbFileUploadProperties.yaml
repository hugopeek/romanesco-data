id: 353
name: fbFileUploadProperties
description: 'These properties are added to the FormIt call if a multiple file upload field is present in the form.'
category: a_fb_properties
properties: 'a:2:{s:13:"elementStatus";a:7:{s:4:"name";s:13:"elementStatus";s:4:"desc";s:0:"";s:4:"type";s:9:"textfield";s:7:"options";a:0:{}s:5:"value";s:5:"solid";s:7:"lexicon";s:20:"romanesco:properties";s:4:"area";s:0:"";}s:14:"elementPreview";a:7:{s:4:"name";s:14:"elementPreview";s:4:"desc";s:0:"";s:4:"type";s:9:"textfield";s:7:"options";a:0:{}s:5:"value";s:0:"";s:7:"lexicon";s:20:"romanesco:properties";s:4:"area";s:0:"";}}'

-----

[[cbGetFieldContent:toPlaceholder=`fb[[*id]].upload-uids`?
    &field=`[[++formblocks.cb_input_file_multiple_id:empty=`-1`]]`
    &tpl=`fbFileUploadFieldUIDs`
]]
[[cbGetFieldContent:toPlaceholder=`fb[[*id]].upload-required-uids`?
    &field=`[[++formblocks.cb_input_file_multiple_id:empty=`-1`]]`
    &tpl=`fbFileUploadFieldUIDs`
    &fieldSettingFilter=`field_required==1`
]]
&ajaxuploadTarget=`[[*fb_attachment_path:empty=`[[++formblocks.attachment_path]]`]]`
&ajaxuploadUid=`[[+fb[[*id]].upload-uids]]`
&ajaxuploadRequiredUid=`[[+fb[[*id]].upload-required-uids]]`
&ajaxuploadSanitizeFilename=`[[++formblocks.sanitize_filenames]]`
&ajaxuploadAllowOverwrite=`1`